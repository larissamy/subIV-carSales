apiVersion: apps/v1
kind: Deployment
metadata:
  name: carsales-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carsales-api
  template:
    metadata:
      labels:
        app: carsales-api
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
      containers:
        - name: carsales-api
          image: larissay/subiv-carsales:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: carsales-config
            - secretRef:
                name: carsales-secrets
          volumeMounts:
            - name: cars-main-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /swagger-ui/index.html
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /swagger-ui/index.html
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
      volumes:
        - name: cars-main-data
          persistentVolumeClaim:
            claimName: cars-main-pvc
