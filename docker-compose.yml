services:
  carsales-api:
    build: .
    container_name: subiv-carsales-api
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: "jdbc:sqlite:/data/cars-main.db"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
    volumes:
      - cars-main-data:/data

volumes:
  cars-main-data:
